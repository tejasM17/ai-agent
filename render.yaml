services:
  - type: web
    name: medi-sync-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # Set this in Render Dashboard
      - key: PORT
        value: 10000
